services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    # Lab only. Create realm `itl` + client `itl-lab-client` before live capture.
